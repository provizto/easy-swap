<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq Finance - Next-Gen DeFi-RWA Aggregator</title>
    <style>
        /* --- CORE CONFIGURATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: #050b14;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- LANG SWITCHER FIXED BUTTON --- */
        .lang-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 8px;
            background: rgba(5, 11, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #a0aec0;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
        }

        .lang-btn.active {
            background-color: #00f2c3;
            color: #050b14;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 242, 195, 0.07) 0%, transparent 50%);
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            gap: 50px;
        }

        .hero-content { flex: 1; max-width: 600px; }

        .tagline-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 242, 195, 0.1);
            border: 1px solid rgba(0, 242, 195, 0.3);
            border-radius: 20px;
            color: #00f2c3;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 60%, #00f2c3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .cta-group { display: flex; gap: 20px; flex-wrap: wrap; }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary { background-color: #00f2c3; color: #050b14; box-shadow: 0 4px 20px rgba(0, 242, 195, 0.3); }
        .btn-primary:hover { background-color: #00d1a7; transform: translateY(-2px); }
        .btn-secondary { background-color: transparent; color: #ffffff; border: 2px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { border-color: #00f2c3; color: #00f2c3; transform: translateY(-2px); }

        .hero-visual { flex: 1; display: flex; justify-content: center; align-items: center; }

        .logo-glow-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #0066ff, #00f2c3);
            border-radius: 24% 76% 35% 65% / 49% 45% 55% 51%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(0, 242, 195, 0.2);
            animation: floatAnimation 6s ease-in-out infinite;
        }

        .logo-inner-text { font-size: 7rem; font-weight: 900; color: #050b14; }

        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 968px) {
            .hero { padding: 120px 5% 60px 5%; text-align: center; }
            .hero-container { flex-direction: column-reverse; gap: 40px; }
            .hero-content h1 { font-size: 2.5rem; }
            .cta-group { justify-content: center; }
            .logo-glow-wrapper { width: 180px; height: 180px; }
            .logo-inner-text { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <!-- TOMBOL PENGUBAH BAHASA -->
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="switchLang('id')">ID</button>
        <button class="lang-btn" onclick="switchLang('en')">EN</button>
    </div>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-container">
            
            <div class="hero-content">
                <div class="tagline-badge" id="badge-text">Layer-2 DeFi Aggregator</div>
                <h1 id="hero-title">Zoniq Finance: DeFi Semudah Pakai Email.</h1>
                <p id="hero-desc">Protokol agregator DeFi-RWA berbiaya rendah di jaringan Base & Arbitrum. Jaminkan aset dunia nyata Anda secara permissionless untuk mendapatkan likuiditas instan dengan biaya gas di bawah $0.01.</p>
                
                <div class="cta-group">
                    <a href="app.html" class="btn btn-primary" id="btn-app">Buka Aplikasi</a>
                    <a href="whitepaper.html" class="btn btn-secondary" id="btn-wp">Baca One-Pager</a>
                </div>
            </div>

            <div class="hero-visual">
                <div class="logo-glow-wrapper">
                    <div class="logo-inner-text">Z</div>
                </div>
            </div>

        </div>
    </section>

    <!-- LOGIKA JAVASCRIPT MULTIBAHASA -->
    <script>
        // Kamus Bahasa (ID & EN)
        const translations = {
            id: {
                badge: "Layer-2 DeFi Aggregator",
                title: "Zoniq Finance: DeFi Semudah Pakai Email.",
                desc: "Protokol agregator DeFi-RWA berbiaya rendah di jaringan Base & Arbitrum. Jaminkan aset dunia nyata Anda secara permissionless untuk mendapatkan likuiditas instan dengan biaya gas di bawah $0.01.",
                btnApp: "Buka Aplikasi",
                btnWp: "Baca One-Pager"
            },
            en: {
                badge: "Layer-2 DeFi Aggregator",
                title: "Zoniq Finance: DeFi as Easy as Using Email.",
                desc: "A low-cost DeFi-RWA aggregator protocol built on Base & Arbitrum networks. Cross-collateralize your Real World Assets permissionlessly to access instant liquidity with gas fees under $0.01.",
                btnApp: "Launch App",
                btnWp: "Read One-Pager"
            }
        };

        // Fungsi untuk mengubah bahasa teks di web
        function switchLang(lang) {
            // 1. Ubah teks berdasarkan elemen ID
            document.getElementById('badge-text').innerText = translations[lang].badge;
            document.getElementById('hero-title').innerText = translations[lang].title;
            document.getElementById('hero-desc').innerText = translations[lang].desc;
            document.getElementById('btn-app').innerText = translations[lang].btnApp;
            document.getElementById('btn-wp').innerText = translations[lang].btnWp;

            // 2. Mengatur status tombol aktif (visual warna hijau toska)
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Tambahkan kelas active ke tombol yang sedang diklik
            if(lang === 'id') buttons[0].classList.add('active');
            if(lang === 'en') buttons[1].classList.add('active');
        }
    </script>

</body>
</html>
