<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq Finance - Next-Gen DeFi-RWA Aggregator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #cbd5e1;
            --title-color: #f8fafc;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --toggle-bg: #1e293b;
            --toggle-handle: #38bdf8;
            --toggle-text-active: #0f172a;
            --btn-glow: rgba(56, 189, 248, 0.4);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 60px; }
        .toggle-container { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }
        .switch { position: relative; display: inline-block; width: 140px; height: 40px; background-color: var(--toggle-bg); border: 1px solid var(--border-color); border-radius: 20px; cursor: pointer; user-select: none; }
        .switch-label { position: absolute; top: 0; width: 70px; height: 40px; line-height: 40px; text-align: center; font-weight: 700; font-size: 0.9rem; color: var(--text-color); z-index: 2; transition: color 0.3s; }
        .switch-label.label-id { left: 0; }
        .switch-label.label-en { right: 0; }
        .switch-handle { position: absolute; top: 2px; left: 2px; width: 66px; height: 34px; background-color: var(--toggle-handle); border-radius: 18px; z-index: 1; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .switch.active-id .label-id { color: var(--toggle-text-active); }
        .switch.active-en .label-en { color: var(--toggle-text-active); }
        .switch.active-en .switch-handle { transform: translateX(68px); }
        .hero { text-align: center; margin-bottom: 60px; }
        .logo-badge { font-size: 1rem; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .hero h1 { color: var(--title-color); font-size: 2.8rem; font-weight: 800; margin: 0 0 20px 0; line-height: 1.2; }
        .hero p { font-size: 1.2rem; max-width: 700px; margin: 0 auto 30px auto; color: #94a3b8; }
        .cta-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .btn { display: inline-block; padding: 12px 30px; font-size: 1rem; font-weight: 700; border-radius: 30px; text-decoration: none; transition: all 0.3s ease; }
        .btn-launch { color: #0f172a; background-color: var(--accent-color); box-shadow: 0 0 15px var(--btn-glow); }
        .btn-onepager { color: var(--title-color); border: 1px solid var(--border-color); background: rgba(255, 255, 255, 0.02); }
        .section-title { text-align: center; color: var(--title-color); font-size: 1.8rem; margin-top: 60px; margin-bottom: 35px; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background-color: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); }
        .card-icon { font-size: 1.8rem; margin-bottom: 15px; display: block; }
        .card h3 { color: var(--title-color); margin: 0 0 10px 0; font-size: 1.25rem; }
        .card p { margin: 0; font-size: 0.95rem; color: #94a3b8; }
        .tokenomics-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 35px; margin-bottom: 60px; }
        .tokenomics-layout { display: grid; grid-template-columns: 1fr; gap: 30px; align-items: center; }
        @media (min-width: 768px) { .tokenomics-layout { grid-template-columns: 1.2fr 1fr; } }
        .tokenomics-img-wrap { text-align: center; }
        .tokenomics-img { max-width: 100%; height: auto; border-radius: 10px; }
        .token-list { list-style: none; padding: 0; margin: 0; }
        .token-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.5); }
        .token-pct { color: var(--accent-color); font-weight: 700; }
        .roadmap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .roadmap-card { background: rgba(30, 41, 59, 0.5); border: 1px solid var(--border-color); border-radius: 10px; padding: 25px; }
        .roadmap-q { color: var(--accent-color); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .roadmap-card h3 { color: var(--title-color); margin: 0 15px 15px 0; font-size: 1.15rem; }
        .roadmap-list { padding-left: 18px; margin: 0; font-size: 0.9rem; color: #94a3b8; }
        footer { text-align: center; padding-top: 40px; border-top: 1px solid var(--border-color); font-size: 0.9rem; color: #64748b; }
        footer a { color: var(--accent-color); text-decoration: none; margin-left: 15px; }
        .lang-section { animation: fadeIn 0.4s ease; }
        .lang-section.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="toggle-container">
            <div id="langToggle" class="switch active-en" onclick="toggleLanguage()">
                <div class="switch-label label-id">ID</div>
                <div class="switch-label label-en">EN</div>
                <div class="switch-handle"></div>
            </div>
        </div>
    </div>
    <!-- Sections for ID and EN are included here -->
    <div id="sect-id" class="lang-section hidden" lang="id">... [Content Bahasa Indonesia] ...</div>
    <div id="sect-en" class="lang-section" lang="en">... [Content English] ...</div>
    <footer>&copy; 2026 Zoniq Finance.</footer>
</div>
<script>
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            let date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Strict";
    }
    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0)==' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }
    function applyLanguage(lang) {
        const toggle = document.getElementById('langToggle');
        const sectId = document.getElementById('sect-id');
        const sectEn = document.getElementById('sect-en');
        if (lang === 'id') {
            toggle.classList.remove('active-en');
            toggle.classList.add('active-id');
            sectId.classList.remove('hidden');
            sectEn.classList.add('hidden');
        } else {
            toggle.classList.remove('active-id');
            toggle.classList.add('active-en');
            sectId.classList.add('hidden');
            sectEn.classList.remove('hidden');
        }
    }
    function toggleLanguage() {
        const toggle = document.getElementById('langToggle');
        let nextLang = toggle.classList.contains('active-en') ? 'id' : 'en';
        applyLanguage(nextLang);
        setCookie('oniq_lang', nextLang, 30);
    }
    window.onload = function() {
        let savedLang = getCookie('oniq_lang');
        applyLanguage(savedLang || 'en');
    };
</script>
</body>
</html>
